<svg viewBox="0 0 1200 1180" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="1200" height="1180" fill="#fbfbfa"/>
  <text x="600" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">GPU HA — Solution Architecture</text>
  <text x="600" y="68" text-anchor="middle" font-size="15" fill="#6b6b6b">Two tiers, one content-free telemetry contract driving both. DNS = coarse pool evacuation · L7 = per-request routing.</text>

  <!-- legend -->
  <rect x="905" y="90" width="270" height="60" rx="8" fill="#fff" stroke="#ccc"/>
  <rect x="920" y="103" width="16" height="16" rx="3" fill="#e9f2ec" stroke="#9cc7ab"/>
  <text x="944" y="116" font-size="12.5" fill="#333">always-on (control plane)</text>
  <rect x="920" y="125" width="16" height="16" rx="3" fill="#f4f1ec" stroke="#d8cfc0"/>
  <text x="944" y="138" font-size="12.5" fill="#333">ephemeral (GPU pools)</text>

  <!-- client -->
  <rect x="330" y="100" width="540" height="58" rx="10" fill="#eef2f8" stroke="#c3d0e4"/>
  <text x="600" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#2b3a55">CLIENT — application on the OpenAI SDK</text>
  <text x="600" y="146" text-anchor="middle" font-size="12.5" fill="#5a6b85">one base URL: api.gpuha.com</text>
  <line x1="600" y1="158" x2="600" y2="196" stroke="#5a6b85" stroke-width="2" marker-end="url(#a1)"/>
  <text x="620" y="182" font-size="12.5" fill="#5a6b85">(1) resolve</text>

  <!-- Tier 1 -->
  <rect x="120" y="198" width="960" height="120" rx="12" fill="#e9f2ec" stroke="#b3d4bf"/>
  <text x="140" y="226" font-size="17" font-weight="700" fill="#245a3a">TIER 1 — DNS (authoritative) · tier1_dns.py · on the always-on plane</text>
  <text x="140" y="252" font-size="13" fill="#4a4a4a">COARSE routing only: answers the SET of GPU pools that currently have fresh telemetry.</text>
  <text x="140" y="273" font-size="13" fill="#4a4a4a">Pool silent &gt;10s → dropped from the answer.   ALL pools dark → answers the WHALE IP  [FAILSAFE→WHALE].</text>
  <text x="140" y="298" font-size="12.5" font-style="italic" fill="#6b6b6b">Never picks a worker. Never sees a request. Slower-twitch than the L7 tier by design (10s vs 3s).</text>
  <line x1="600" y1="318" x2="600" y2="356" stroke="#5a6b85" stroke-width="2" marker-end="url(#a1)"/>
  <text x="620" y="342" font-size="12.5" fill="#5a6b85">(2) connect to the chosen pool's router</text>

  <!-- Tier 2 -->
  <rect x="120" y="358" width="960" height="170" rx="12" fill="#e9f2ec" stroke="#b3d4bf"/>
  <text x="140" y="386" font-size="17" font-weight="700" fill="#245a3a">TIER 2 — L7 router (one per pool) · OpenAI-compatible reverse proxy</text>
  <text x="140" y="410" font-size="13" fill="#4a4a4a">PER-REQUEST routing. Pipeline:</text>
  <rect x="140" y="422" width="150" height="42" rx="6" fill="#fff" stroke="#9cc7ab"/><text x="215" y="448" text-anchor="middle" font-size="12.5" font-weight="600" fill="#333">freshness gate</text>
  <line x1="290" y1="443" x2="318" y2="443" stroke="#5a6b85" stroke-width="1.8" marker-end="url(#a1)"/>
  <rect x="320" y="422" width="290" height="42" rx="6" fill="#fff" stroke="#9cc7ab"/><text x="465" y="443" text-anchor="middle" font-size="12" font-weight="600" fill="#333">weighted selector</text><text x="465" y="458" text-anchor="middle" font-size="10.5" fill="#6b6b6b">scores by TTFT + VRAM headroom</text>
  <line x1="610" y1="443" x2="638" y2="443" stroke="#5a6b85" stroke-width="1.8" marker-end="url(#a1)"/>
  <rect x="640" y="422" width="150" height="42" rx="6" fill="#fff" stroke="#9cc7ab"/><text x="715" y="448" text-anchor="middle" font-size="12.5" font-weight="600" fill="#333">circuit breaker</text>
  <line x1="790" y1="443" x2="818" y2="443" stroke="#5a6b85" stroke-width="1.8" marker-end="url(#a1)"/>
  <rect x="820" y="422" width="150" height="42" rx="6" fill="#fff" stroke="#9cc7ab"/><text x="895" y="448" text-anchor="middle" font-size="12.5" font-weight="600" fill="#333">anti-herding</text>
  <rect x="140" y="474" width="830" height="42" rx="6" fill="#eef7f1" stroke="#b3d4bf"/>
  <text x="555" y="495" text-anchor="middle" font-size="12.5" font-weight="700" fill="#245a3a">first-token latch:  failure BEFORE first token = silent retry to another worker  ·  failure AFTER first token = clean truncation, never a fake resume</text>
  <line x1="600" y1="528" x2="600" y2="566" stroke="#5a6b85" stroke-width="2" marker-end="url(#a1)"/>
  <text x="620" y="552" font-size="12.5" fill="#5a6b85">(3) proxy streamed tokens</text>

  <!-- GPU workers -->
  <rect x="120" y="568" width="720" height="150" rx="12" fill="#f4f1ec" stroke="#d8cfc0"/>
  <text x="140" y="596" font-size="17" font-weight="700" fill="#5a4a2b">GPU WORKERS — 2+ stock vLLM servers per pool (unmodified vendor software)</text>
  <g>
    <rect x="150" y="612" width="200" height="90" rx="8" fill="#fff" stroke="#d8cfc0"/>
    <text x="250" y="636" text-anchor="middle" font-size="13" font-weight="600" fill="#333">vLLM worker :8000</text>
    <rect x="166" y="648" width="168" height="40" rx="6" fill="#eef4ef" stroke="#bcd"/>
    <text x="250" y="667" text-anchor="middle" font-size="11.5" fill="#333">telemetry shim</text>
    <text x="250" y="681" text-anchor="middle" font-size="10.5" fill="#6b6b6b">scrapes /metrics</text>
    <rect x="380" y="612" width="200" height="90" rx="8" fill="#fff" stroke="#d8cfc0"/>
    <text x="480" y="636" text-anchor="middle" font-size="13" font-weight="600" fill="#333">vLLM worker :8000</text>
    <rect x="396" y="648" width="168" height="40" rx="6" fill="#eef4ef" stroke="#bcd"/>
    <text x="480" y="667" text-anchor="middle" font-size="11.5" fill="#333">telemetry shim</text>
    <text x="480" y="681" text-anchor="middle" font-size="10.5" fill="#6b6b6b">scrapes /metrics</text>
  </g>
  <text x="700" y="650" font-size="12" fill="#6b6b6b">…N workers</text>
  <text x="700" y="670" font-size="12" fill="#6b6b6b">per pool</text>

  <!-- whale -->
  <rect x="860" y="568" width="220" height="150" rx="12" fill="#e9f2ec" stroke="#b3d4bf"/>
  <text x="970" y="596" text-anchor="middle" font-size="15" font-weight="700" fill="#245a3a">THE WHALE</text>
  <text x="970" y="620" text-anchor="middle" font-size="11.5" fill="#4a4a4a">last resort · always-on · :8080</text>
  <text x="970" y="642" text-anchor="middle" font-size="11.5" fill="#4a4a4a">"dumbest thing in the fleet"</text>
  <text x="970" y="660" text-anchor="middle" font-size="11" fill="#6b6b6b">no state, no deps, precomputed</text>
  <text x="970" y="682" text-anchor="middle" font-size="11" fill="#6b6b6b">serves 200 graceful completion</text>
  <text x="970" y="699" text-anchor="middle" font-size="11" fill="#6b6b6b">(or 503+Retry-After) ONLY when</text>
  <text x="970" y="713" text-anchor="middle" font-size="11" fill="#6b6b6b">Tier-1 has failed everything to it</text>

  <!-- telemetry contract -->
  <rect x="120" y="748" width="960" height="220" rx="12" fill="#fff5e9" stroke="#e0c48a"/>
  <text x="600" y="778" text-anchor="middle" font-size="17" font-weight="700" fill="#8a5a1a">THE TELEMETRY CONTRACT (the load-bearing design decision)</text>
  <text x="600" y="804" text-anchor="middle" font-size="13" fill="#4a4a4a">ONE versioned UDP message — TelemetryFrame — that is CONTENT-FREE: node identity + sequence + performance metrics. NEVER a prompt or token.</text>

  <!-- frame node -->
  <rect x="500" y="822" width="200" height="50" rx="8" fill="#fdecc8" stroke="#e0c48a"/>
  <text x="600" y="843" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5a1a">TelemetryFrame (UDP)</text>
  <text x="600" y="861" text-anchor="middle" font-size="11" fill="#6b6b6b">emitted by every worker's shim</text>

  <!-- fan to two consumers -->
  <line x1="500" y1="847" x2="300" y2="905" stroke="#8a5a1a" stroke-width="2.2" marker-end="url(#a2)"/>
  <line x1="700" y1="847" x2="900" y2="905" stroke="#8a5a1a" stroke-width="2.2" marker-end="url(#a2)"/>
  <rect x="150" y="908" width="300" height="52" rx="8" fill="#eef7f1" stroke="#b3d4bf"/>
  <text x="300" y="930" text-anchor="middle" font-size="12.5" font-weight="700" fill="#245a3a">→ pool router (udp/5006)</text>
  <text x="300" y="948" text-anchor="middle" font-size="11.5" fill="#4a4a4a">per-request WORKER selection</text>
  <rect x="750" y="908" width="300" height="52" rx="8" fill="#eef7f1" stroke="#b3d4bf"/>
  <text x="900" y="930" text-anchor="middle" font-size="12.5" font-weight="700" fill="#245a3a">→ Tier-1 DNS (udp/5106, internet)</text>
  <text x="900" y="948" text-anchor="middle" font-size="11.5" fill="#4a4a4a">POOL evacuation</text>
  <text x="600" y="936" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5a1a">SAME ingest code,</text>
  <text x="600" y="953" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5a1a">both tiers</text>

  <!-- principle bar -->
  <rect x="120" y="984" width="960" height="60" rx="10" fill="#eef2f8" stroke="#c3d0e4"/>
  <text x="600" y="1010" text-anchor="middle" font-size="14" font-weight="700" fill="#2b3a55">LIVENESS = consumer-judged arrival freshness.  No worker ever asserts health.  Silence = death.</text>
  <text x="600" y="1031" text-anchor="middle" font-size="12" fill="#5a6b85">A node/pool that stops emitting ages out on the consumer's own clock — no health-check endpoint to lie.</text>

  <!-- infra note -->
  <rect x="120" y="1060" width="960" height="60" rx="10" fill="#f4f1ec" stroke="#d8cfc0"/>
  <text x="600" y="1086" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5a4a2b">Control plane (Tier-1 + whale) = one small ALWAYS-ON box (~$12/mo).  GPU pools = EPHEMERAL, spun up on-demand across Lambda / RunPod / GCP, torn to $0 when idle.</text>
  <text x="600" y="1107" text-anchor="middle" font-size="12" fill="#6b6b6b">All data-plane components are stdlib-only, zero cloud-provider dependencies.</text>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5a6b85" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a5a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
</svg>

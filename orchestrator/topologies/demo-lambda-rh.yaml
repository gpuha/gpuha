# Router-head (host-level) topology: ONE logical pool = TWO Lambda A10 instances.
# A = router-head + worker A (vLLM localhost); B = worker B only, :8000 scoped to A.
# Kill B's INSTANCE mid-traffic -> A (different host) serves = host-level failover.
name: demo-lambda-rh
min_pools: 1
plane:
  host: 203.0.113.10
  tier1_telem_port: 5106
  tier1_dns_port: 5353
  pool_map_file: /root/gpuha-runs/tier1-pools.map
  tier1_service: gpuha-tier1
  http_port: 8090
  instance_type: gpu_1x_a10
pools:
  - name: gpuha-target-lambda-rh
    provider: lambda
    role: gpu
    machine_type: gpu_1x_a10
    workers: 1
    warmup_budget: 1800
    router_head: true
    regions:
      - us-east-1
      - us-west-1
